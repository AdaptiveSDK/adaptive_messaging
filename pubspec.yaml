name: adaptive_messaging
description: >-
  Flutter plugin for the Adaptive SDK Messaging module. Registers FCM tokens,
  detects Adaptive push-notification payloads, and displays in-app notifications
  for the Adaptive e-learning platform.
version: 1.0.21
homepage: https://github.com/AdaptiveSDK/adaptive_messaging
repository: https://github.com/AdaptiveSDK/adaptive_messaging
issue_tracker: https://github.com/AdaptiveSDK/adaptive_messaging/issues

topics:
  - adaptive
  - messaging
  - push-notifications
  - fcm

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.adaptive.messaging
        pluginClass: AdaptiveMessagingFlutterPlugin
      ios:
        pluginClass: AdaptiveMessagingFlutterPlugin
