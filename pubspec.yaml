name: adaptive_messaging_flutter
description: >-
  Flutter plugin for the Adaptive SDK Messaging module. Registers FCM tokens,
  detects Adaptive push-notification payloads, and displays in-app notifications
  for the Adaptive e-learning platform.
version: 1.0.0
homepage: https://github.com/adaptivesdk/adaptive_messaging_flutter
repository: https://github.com/adaptivesdk/adaptive_messaging_flutter
issue_tracker: https://github.com/adaptivesdk/adaptive_messaging_flutter/issues

topics:
  - adaptive
  - messaging
  - push-notifications
  - fcm

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.adaptive.messaging_flutter
        pluginClass: AdaptiveMessagingFlutterPlugin
